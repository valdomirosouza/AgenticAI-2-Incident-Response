services:
  api:
    build:
      context: ./Log-Ingestion-and-Metrics
    ports:
      - "8000:8000"
    env_file:
      - ./Log-Ingestion-and-Metrics/.env.example
      - path: ./.env
        required: false
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  incident-response-agent:
    build:
      context: ./Incident-Response-Agent
    ports:
      - "8001:8001"
    env_file:
      - ./Incident-Response-Agent/.env.example
      - path: ./Incident-Response-Agent/.env
        required: false
      - path: ./.env
        required: false
    environment:
      METRICS_API_URL: http://api:8000
      KB_API_URL: http://knowledge-base:8002
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  knowledge-base:
    build:
      context: ./Knowledge-Base
    ports:
      - "8002:8002"
    env_file:
      - ./Knowledge-Base/.env.example
      - path: ./.env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # REDIS_PASSWORD passed explicitly so the sh script can read it as $REDIS_PASSWORD
    command: >-
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$REDIS_PASSWORD"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
    # Set QDRANT__SERVICE__API_KEY only when QDRANT_API_KEY is non-empty in .env
    # An empty value enables auth with an empty key, which breaks the client
    env_file:
      - path: ./.env
        required: false
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
