services:
  api:
    build:
      context: ./Log-Ingestion-and-Metrics
    ports:
      - "8000:8000"
    env_file:
      - ./Log-Ingestion-and-Metrics/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  incident-response-agent:
    build:
      context: ./Incident-Response-Agent
    ports:
      - "8001:8001"
    env_file:
      - ./Incident-Response-Agent/.env.example
      - path: ./Incident-Response-Agent/.env
        required: false
    environment:
      METRICS_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
